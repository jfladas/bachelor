name: Build and Notarize

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Renderer
        run: npm run build:renderer

      - name: Prepare Apple API Key
        run: |
          mkdir -p "$RUNNER_TEMP/.private_keys"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$RUNNER_TEMP/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: Configure Keychain Lock Settings
        run: |
          security set-keychain-settings -lut 21600 "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$HOME/Library/Keychains/login.keychain-db" || true

      - name: Build Mac App
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: "${{ secrets.MAC_CSC_LINK }}"
          CSC_KEY_PASSWORD: "${{ secrets.MAC_CSC_KEY_PASSWORD }}"
          DEBUG: "electron-builder*,@electron/notarize*"
          APPLE_API_KEY: "${{ runner.temp }}/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          APPLE_API_KEY_ID: "${{ secrets.APPLE_API_KEY_ID }}"
          APPLE_API_ISSUER: "${{ secrets.APPLE_API_ISSUER }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amorphous-blob-mac
          path: dist_electron/*.dmg
