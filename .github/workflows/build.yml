name: Build and Notarize

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Renderer
        run: npm run build:renderer

      - name: Prepare Apple API Key
        run: |
          mkdir -p "$RUNNER_TEMP/.private_keys"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$RUNNER_TEMP/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: Debug Apple Authentication
        run: |
          xcrun notarytool history \
            --key "$RUNNER_TEMP/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8" \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER }}"

      - name: Build and Publish Mac App
        run: npx electron-builder --mac --publish always
        env:
          CSC_LINK: "${{ secrets.MAC_CSC_LINK }}"
          CSC_KEY_PASSWORD: "${{ secrets.MAC_CSC_KEY_PASSWORD }}"
          NOTARIZE_APPLE_API_KEY: "${{ runner.temp }}/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          NOTARIZE_APPLE_API_KEY_ID: "${{ secrets.APPLE_API_KEY_ID }}"
          NOTARIZE_APPLE_ISSUER_ID: "${{ secrets.APPLE_API_ISSUER }}"
          APPLE_API_KEY: "${{ runner.temp }}/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          APPLE_API_KEY_ID: "${{ secrets.APPLE_API_KEY_ID }}"
          APPLE_API_ISSUER: "${{ secrets.APPLE_API_ISSUER }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
