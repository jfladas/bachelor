name: Build and Notarize

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Renderer
        run: npm run build:renderer

      - name: Create and Configure Custom Keychain
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="temporary_ci_password"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"

          echo "${{ secrets.MAC_CSC_LINK }}" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.MAC_CSC_KEY_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Prepare Apple API Key
        run: |
          mkdir -p "${{ runner.temp }}/.private_keys"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "${{ runner.temp }}/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"

      - name: Build Mac App
        run: |
          echo "Build start: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          /usr/bin/time -p npx electron-builder --mac --publish never
          echo "Build end: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
        env:
          DEBUG: "electron-builder*,@electron/osx-sign*,@electron/notarize*"
          CSC_KEYCHAIN: "${{ runner.temp }}/app-signing.keychain-db"
          APPLE_API_KEY: "${{ runner.temp }}/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          APPLE_API_KEY_ID: "${{ secrets.APPLE_API_KEY_ID }}"
          APPLE_API_ISSUER: "${{ secrets.APPLE_API_ISSUER }}"
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: amorphous-blob-mac
          path: dist_electron/*.dmg
